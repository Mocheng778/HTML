<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ApkeSU 一键自动下载</title>
<style>
body{
    text-align:center;
    padding:60px 20px;
    font-size:18px;
    background:#f8f5fc;
    font-family:system-ui,sans-serif;
}
.box{
    max-width:500px;
    margin:0 auto;
    background:#fff;
    padding:40px 20px;
    border-radius:16px;
    box-shadow:0 4px 16px rgba(153,68,221,0.15);
}
h2{
    color:#552299;
    margin-bottom:16px;
}
.tip{
    color:#666;
    margin-bottom:24px;
    line-height:1.7;
}
.down-btn{
    padding:14px 30px;
    background:#9944dd;
    color:#fff;
    border-radius:99px;
    text-decoration:none;
    display:inline-block;
    font-weight:bold;
    transition:0.2s;
}
.down-btn:hover{
    background:#7722bb;
}
.count-text{
    margin-top:12px;
    font-size:15px;
    color:#f03b3b;
}
</style>
</head>
<body>
<div class="box">
    <h2>ApkeSU V2.6.0_32685 安装包</h2>
    <p class="tip">页面加载完成将自动触发下载<br>强制输出apk格式，不会生成.bak备份文件<br>浏览器拦截弹窗请点击下方按钮手动下载</p>
    <!-- 强制指定apk文件名，修复bak后缀bug -->
    <a href="https://1813997299.cdn.123clouddisk.com/1813997299/36467323" download="ApkeSU_2.6.0_32685-release.apk" class="down-btn">手动下载APK安装包</a>
    <p class="count-text" id="delayTip">3秒后自动发起下载...</p>
</div>

<script>
// 下载常量统一配置，固定apk文件名
const downloadUrl = "https://1813997299.cdn.123clouddisk.com/1813997299/36467323";
const fileName = "ApkeSU_2.6.0_32685-release.apk";
let delayTime = 3;
const tipDom = document.getElementById("delayTip");

const timer = setInterval(()=>{
    delayTime--;
    if(delayTime > 0){
        tipDom.innerText = `${delayTime}秒后自动发起下载...`;
    }else{
        tipDom.innerText = "已尝试自动下载，无弹出请点击上方按钮";
        clearInterval(timer);
        let autoDownload = document.createElement('a');
        autoDownload.href = downloadUrl;
        // 关键修复：JS自动下载强制绑定apk文件名，避免bak
        autoDownload.download = fileName;
        document.body.appendChild(autoDownload);
        autoDownload.click();
        autoDownload.remove();
    }
},1000);
</script>
</body>
</html>
